name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

# Serialize prod deploys; NEVER cancel one mid-flight — a half-applied
# container update is worse than a queued second run.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  RESOURCE_GROUP: rg-twilio-cartoon-printer
  APP_NAME: twilio-cartoon-printer
  LOCATION: centralus
  ACR_NAME: twiliocartoonprinter
  ENV_NAME: cae-twilio-cartoon-printer
  STORAGE_ACCOUNT: twiliocartoonprinter
  FILE_SHARE: twilioprinterdata
  IMAGE_TAG: cartoon-printer:${{ github.sha }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-deploy:
    needs: ci
    if: needs.ci.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # --- Infrastructure (idempotent — safe to run every time) ---

      - name: Ensure resource group exists
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --output none

      - name: Ensure Container Registry exists
        run: |
          az acr show --name ${{ env.ACR_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} 2>/dev/null || \
          az acr create \
            --name ${{ env.ACR_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --sku Basic \
            --admin-enabled true \
            --output none

      - name: Ensure Storage Account exists
        run: |
          az storage account show --name ${{ env.STORAGE_ACCOUNT }} --resource-group ${{ env.RESOURCE_GROUP }} 2>/dev/null || \
          az storage account create \
            --name ${{ env.STORAGE_ACCOUNT }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --sku Standard_LRS \
            --output none

      - name: Ensure File Share exists
        run: |
          STORAGE_KEY=$(az storage account keys list \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --account-name ${{ env.STORAGE_ACCOUNT }} \
            --query '[0].value' -o tsv)
          az storage share create \
            --name ${{ env.FILE_SHARE }} \
            --account-name ${{ env.STORAGE_ACCOUNT }} \
            --account-key "$STORAGE_KEY" \
            --quota 10 \
            --output none 2>/dev/null || true

      - name: Ensure Container Apps Environment exists
        run: |
          az containerapp env show --name ${{ env.ENV_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} 2>/dev/null || \
          az containerapp env create \
            --name ${{ env.ENV_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --output none

      - name: Configure Azure Files storage mount
        run: |
          STORAGE_KEY=$(az storage account keys list \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --account-name ${{ env.STORAGE_ACCOUNT }} \
            --query '[0].value' -o tsv)
          az containerapp env storage set \
            --name ${{ env.ENV_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --storage-name appdata \
            --azure-file-account-name ${{ env.STORAGE_ACCOUNT }} \
            --azure-file-account-key "$STORAGE_KEY" \
            --azure-file-share-name ${{ env.FILE_SHARE }} \
            --access-mode ReadWrite \
            --output none

      # --- Build ---

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_TAG }} \
            --image cartoon-printer:latest \
            .

      # --- Deploy ---

      - name: Get ACR credentials
        id: acr-creds
        run: |
          echo "server=${{ env.ACR_NAME }}.azurecr.io" >> $GITHUB_OUTPUT
          echo "username=$(az acr credential show --name ${{ env.ACR_NAME }} --query username -o tsv)" >> $GITHUB_OUTPUT
          echo "password=$(az acr credential show --name ${{ env.ACR_NAME }} --query 'passwords[0].value' -o tsv)" >> $GITHUB_OUTPUT

      - name: Get Storage Key
        id: storage-key
        run: |
          echo "key=$(az storage account keys list \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --account-name ${{ env.STORAGE_ACCOUNT }} \
            --query '[0].value' -o tsv)" >> $GITHUB_OUTPUT

      - name: Ensure required tags on Container App (tenant policy)
        run: |
          # The tenant 'tag-enforcement-policy' blocks any write to the Container
          # App resource unless required tags are present. Merge them in before
          # 'secret set' runs. Skip cleanly if the app doesn't exist yet — it
          # will be created with tags in the Deploy step below.
          APP_ID=$(az containerapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "id" -o tsv 2>/dev/null || true)
          if [ -n "$APP_ID" ]; then
            az tag update \
              --operation merge \
              --resource-id "$APP_ID" \
              --tags created_by=github-actions managed_by=twilio-cartoon-printer-ci \
              --output none
          else
            echo "Container App does not exist yet — tags will be applied on create."
          fi

      - name: Set secrets
        run: |
          # Set app secrets first (does NOT create a new revision, preserves registry secret)
          az containerapp secret set \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --secrets \
              "twilio-sid=${{ secrets.TWILIO_ACCOUNT_SID }}" \
              "twilio-token=${{ secrets.TWILIO_AUTH_TOKEN }}" \
              "twilio-mssid=${{ secrets.TWILIO_MESSAGING_SERVICE_SID }}" \
              "openai-key=${{ secrets.OPENAI_API_KEY }}" \
              "google-client-id=${{ secrets.GOOGLE_CLIENT_ID }}" \
              "google-client-secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              "session-secret=${{ secrets.SESSION_SECRET }}" \
            --output none

      - name: Deploy Container App
        # ALLOWED_EMAILS = non-@twilio.com sign-in escape hatch, a plain (non-secret)
        # comma-separated GitHub repo variable, substituted into containerapp.yaml.
        # Empty = domain-only (renders as ALLOWED_EMAILS="").
        env:
          ALLOWED_EMAILS: ${{ vars.ALLOWED_EMAILS }}
        run: |
          # Resolve BASE_URL for existing apps; new apps get it on first update
          FQDN=$(az containerapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv 2>/dev/null || true)

          # Render YAML template with image, env vars, and volume mount
          export APP_NAME="${{ env.APP_NAME }}"
          export CONTAINER_IMAGE="${{ steps.acr-creds.outputs.server }}/${{ env.IMAGE_TAG }}"
          export BASE_URL="https://${FQDN}"
          export ALLOWED_EMAILS="${ALLOWED_EMAILS:-}"
          # Restrict substitution to our known vars so no other ${...} in the template is touched.
          envsubst '${APP_NAME} ${CONTAINER_IMAGE} ${BASE_URL} ${ALLOWED_EMAILS}' < .github/containerapp.yaml > /tmp/containerapp.yaml

          if az containerapp show --name ${{ env.APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} 2>/dev/null; then
            echo "Updating existing container app..."
            az containerapp registry set \
              --name ${{ env.APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --server ${{ steps.acr-creds.outputs.server }} \
              --username ${{ steps.acr-creds.outputs.username }} \
              --password "${{ steps.acr-creds.outputs.password }}" \
              --output none

            echo "Deploying image, env vars, and volume mount in a single revision..."
            az containerapp update \
              --name ${{ env.APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --yaml /tmp/containerapp.yaml \
              --output none
          else
            echo "Creating new container app..."
            az containerapp create \
              --name ${{ env.APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --environment ${{ env.ENV_NAME }} \
              --yaml /tmp/containerapp.yaml \
              --registry-server ${{ steps.acr-creds.outputs.server }} \
              --registry-username ${{ steps.acr-creds.outputs.username }} \
              --registry-password "${{ steps.acr-creds.outputs.password }}" \
              --tags created_by=github-actions managed_by=twilio-cartoon-printer-ci \
              --output none
          fi

      - name: Resolve app FQDN
        id: fqdn
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          if [ -z "$FQDN" ]; then echo "Could not resolve container app FQDN."; exit 1; fi
          echo "fqdn=$FQDN" >> "$GITHUB_OUTPUT"

      - name: Smoke test /healthz
        # Wait until the new revision actually serves before reporting success, so a
        # deploy never "completes" while the app is still booting. The startup probe
        # in containerapp.yaml already holds traffic until /healthz passes; this is
        # the CI-side confirmation (and fails the run if the app never comes up).
        env:
          FQDN: ${{ steps.fqdn.outputs.fqdn }}
        run: |
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://$FQDN/healthz" || true)
            if [ "$CODE" = "200" ]; then
              echo "Healthz OK after attempt $i"
              echo ""
              echo "=========================================="
              echo "  Deployment complete!"
              echo "=========================================="
              echo "  App URL:        https://${FQDN}"
              echo "  Admin Console:  https://${FQDN}/home"
              echo "  Dashboard:      https://${FQDN}/dashboard"
              echo "  Twilio Webhook: https://${FQDN}/inbound"
              echo "=========================================="
              exit 0
            fi
            echo "Attempt $i: status=$CODE — retrying in 10s"; sleep 10
          done
          echo "::error::Healthz never returned 200 after 5 minutes."; exit 1
