version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
    labels:
      - dependencies

  # relay-app is a standalone npm project (Electron print-relay GUI) with its
  # own package-lock.json — its deps are tracked separately from the root app.
  - package-ecosystem: npm
    directory: /relay-app
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      relay-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - relay-app

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - ci
