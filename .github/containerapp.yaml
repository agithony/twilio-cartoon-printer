properties:
  configuration:
    ingress:
      external: true
      targetPort: 8080
  template:
    containers:
      - name: ${APP_NAME}
        image: ${CONTAINER_IMAGE}
        resources:
          cpu: 1.0
          memory: 4Gi
        env:
          - name: PORT
            value: "8080"
          - name: NODE_ENV
            value: production
          - name: ENABLE_PRINTING
            value: "false"
          - name: DATA_MOUNT
            value: /app/appdata
          - name: BASE_URL
            value: ${BASE_URL}
          - name: TWILIO_ACCOUNT_SID
            secretRef: twilio-sid
          - name: TWILIO_AUTH_TOKEN
            secretRef: twilio-token
          - name: OPENAI_API_KEY
            secretRef: openai-key
          - name: GOOGLE_CLIENT_ID
            secretRef: google-client-id
          - name: GOOGLE_CLIENT_SECRET
            secretRef: google-client-secret
          - name: SESSION_SECRET
            secretRef: session-secret
        volumeMounts:
          - volumeName: appdata
            mountPath: /app/appdata
    scale:
      minReplicas: 1
      maxReplicas: 1
    volumes:
      - name: appdata
        storageName: appdata
        storageType: AzureFile
