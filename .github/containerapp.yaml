properties:
  configuration:
    ingress:
      external: true
      targetPort: 8080
  template:
    containers:
      - name: ${APP_NAME}
        image: ${CONTAINER_IMAGE}
        resources:
          cpu: 2.0
          memory: 4Gi
        env:
          - name: PORT
            value: "8080"
          - name: NODE_ENV
            value: production
          - name: ENABLE_PRINTING
            value: "false"
          - name: DATA_MOUNT
            value: /app/appdata
          - name: BASE_URL
            value: ${BASE_URL}
          # Non-@twilio.com sign-in escape hatch (comma-separated). Empty = domain only.
          - name: ALLOWED_EMAILS
            value: "${ALLOWED_EMAILS}"
          - name: TWILIO_ACCOUNT_SID
            secretRef: twilio-sid
          - name: TWILIO_AUTH_TOKEN
            secretRef: twilio-token
          - name: TWILIO_MESSAGING_SERVICE_SID
            secretRef: twilio-mssid
          - name: TWILIO_WHATSAPP_NUMBER
            value: "${TWILIO_WHATSAPP_NUMBER}"
          - name: TWILIO_WHATSAPP_MESSAGING_SERVICE_SID
            value: "${TWILIO_WHATSAPP_MESSAGING_SERVICE_SID}"
          - name: TWILIO_TEMPLATE_DELIVERY
            value: "${TWILIO_TEMPLATE_DELIVERY}"
          - name: TWILIO_TEMPLATE_RATING
            value: "${TWILIO_TEMPLATE_RATING}"
          - name: TWILIO_TEMPLATE_PROMO
            value: "${TWILIO_TEMPLATE_PROMO}"
          - name: TWILIO_TEMPLATE_NUDGE
            value: "${TWILIO_TEMPLATE_NUDGE}"
          - name: OPENAI_API_KEY
            secretRef: openai-key
          - name: GOOGLE_CLIENT_ID
            secretRef: google-client-id
          - name: GOOGLE_CLIENT_SECRET
            secretRef: google-client-secret
          - name: SESSION_SECRET
            secretRef: session-secret
        volumeMounts:
          - volumeName: appdata
            mountPath: /app/appdata
        # Health probes eliminate the post-deploy 404 window: Container Apps holds
        # traffic away from the new revision until the STARTUP probe passes, and the
        # READINESS probe keeps an unready replica out of rotation. /healthz is the
        # app's liveness endpoint (lib/health.js → app.get("/healthz")).
        probes:
          - type: Startup
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 20   # up to ~60s for the app to bind routes
          - type: Readiness
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
    scale:
      minReplicas: 1
      maxReplicas: 1
    volumes:
      - name: appdata
        storageName: appdata
        storageType: AzureFile
